name: Deploy Vercel

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or SHA to deploy manually
        required: false
        type: string
      target:
        description: Deployment target for manual runs
        required: false
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.detect.outputs.ready }}
      reason: ${{ steps.detect.outputs.reason }}
      deploy_path: ${{ steps.detect.outputs.deploy_path }}
      deploy_target: ${{ steps.detect.outputs.deploy_target }}
      checkout_ref: ${{ steps.detect.outputs.checkout_ref }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Detect deployment readiness
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
              echo "ready=false" >> "${GITHUB_OUTPUT}"
              echo "reason=CI workflow did not succeed." >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [[ "${{ github.event.workflow_run.head_repository.full_name }}" != "${GITHUB_REPOSITORY}" ]]; then
              echo "ready=false" >> "${GITHUB_OUTPUT}"
              echo "reason=Skipping Vercel deployment for forked workflow_run." >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"

            if [[ "${{ github.event.workflow_run.event }}" == "push" && "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
              echo "deploy_target=production" >> "${GITHUB_OUTPUT}"
            else
              echo "deploy_target=preview" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "checkout_ref=${{ inputs.ref || github.sha }}" >> "${GITHUB_OUTPUT}"
            echo "deploy_target=${{ inputs.target || 'preview' }}" >> "${GITHUB_OUTPUT}"
          fi

          if [[ -z "${VERCEL_TOKEN}" || -z "${VERCEL_ORG_ID}" || -z "${VERCEL_PROJECT_ID}" ]]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "reason=Missing Vercel secrets." >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "ready=true" >> "${GITHUB_OUTPUT}"
          echo "deploy_path=frontend" >> "${GITHUB_OUTPUT}"

      - name: Summarize deployment plan
        run: |
          {
            echo "## Vercel deployment plan"
            echo
            echo "- ready: ${{ steps.detect.outputs.ready }}"
            echo "- reason: ${{ steps.detect.outputs.reason || 'ready to deploy' }}"
            echo "- checkout_ref: ${{ steps.detect.outputs.checkout_ref }}"
            echo "- deploy_target: ${{ steps.detect.outputs.deploy_target }}"
            echo "- deploy_path: ${{ steps.detect.outputs.deploy_path || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs:
      - plan
    if: needs.plan.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Set up workspace
        uses: ./.github/actions/setup-workspace
        with:
          ref: ${{ needs.plan.outputs.checkout_ref }}

      - name: Pull Vercel environment configuration
        working-directory: ${{ needs.plan.outputs.deploy_path }}
        run: |
          if [[ "${{ needs.plan.outputs.deploy_target }}" == "production" ]]; then
            pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"
          else
            pnpm dlx vercel@latest pull --yes --environment=preview --token="${VERCEL_TOKEN}"
          fi

      - name: Reproduce frontend build gate locally in CI
        run: pnpm ci:build

      - name: Build with Vercel
        working-directory: ${{ needs.plan.outputs.deploy_path }}
        run: pnpm dlx vercel@latest build --token="${VERCEL_TOKEN}"

      - name: Deploy preview
        if: needs.plan.outputs.deploy_target != 'production'
        working-directory: ${{ needs.plan.outputs.deploy_path }}
        run: pnpm dlx vercel@latest deploy --prebuilt --token="${VERCEL_TOKEN}"

      - name: Deploy production
        if: needs.plan.outputs.deploy_target == 'production'
        working-directory: ${{ needs.plan.outputs.deploy_path }}
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"

      - name: Summarize deployment reproduction
        if: always()
        run: |
          {
            echo "## Local reproduction"
            echo
            echo "- Validate gate locally: \`corepack pnpm ci:lint && corepack pnpm ci:typecheck && corepack pnpm ci:test && corepack pnpm ci:build\`"
            echo "- Preview deploy manually: \`vercel pull --yes --environment=preview && vercel build && vercel deploy --prebuilt\` from \`${{ needs.plan.outputs.deploy_path }}\`"
            echo "- Production deploy manually: \`vercel pull --yes --environment=production && vercel build && vercel deploy --prebuilt --prod\` from \`${{ needs.plan.outputs.deploy_path }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
