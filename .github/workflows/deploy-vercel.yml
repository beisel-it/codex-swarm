name: Deploy Vercel

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Detect deployment readiness
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          candidates=(
            "apps/web"
            "frontend"
          )

          deploy_path=""

          for candidate in "${candidates[@]}"; do
            if [[ -f "${candidate}/package.json" ]]; then
              deploy_path="${candidate}"
              break
            fi
          done

          if [[ -z "${deploy_path}" && -f "vercel.json" ]]; then
            deploy_path="."
          fi

          if [[ -z "${deploy_path}" ]]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "reason=No deployable Vercel app path found yet." >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${VERCEL_TOKEN}" || -z "${VERCEL_ORG_ID}" || -z "${VERCEL_PROJECT_ID}" ]]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "reason=Missing Vercel secrets." >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "ready=true" >> "${GITHUB_OUTPUT}"
          echo "deploy_path=${deploy_path}" >> "${GITHUB_OUTPUT}"

      - name: Skip deployment
        if: steps.detect.outputs.ready != 'true'
        run: echo "${{ steps.detect.outputs.reason }}"

      - name: Install dependencies
        if: steps.detect.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment configuration
        if: steps.detect.outputs.ready == 'true'
        working-directory: ${{ steps.detect.outputs.deploy_path }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" ]]; then
            pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"
          else
            pnpm dlx vercel@latest pull --yes --environment=preview --token="${VERCEL_TOKEN}"
          fi

      - name: Build with Vercel
        if: steps.detect.outputs.ready == 'true'
        working-directory: ${{ steps.detect.outputs.deploy_path }}
        run: pnpm dlx vercel@latest build --token="${VERCEL_TOKEN}"

      - name: Deploy preview
        if: steps.detect.outputs.ready == 'true' && github.event_name != 'push'
        working-directory: ${{ steps.detect.outputs.deploy_path }}
        run: pnpm dlx vercel@latest deploy --prebuilt --token="${VERCEL_TOKEN}"

      - name: Deploy production
        if: steps.detect.outputs.ready == 'true' && github.event_name == 'push' && github.ref_name == 'main'
        working-directory: ${{ steps.detect.outputs.deploy_path }}
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
