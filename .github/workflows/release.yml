name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Configure Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@beisel-it"

      - name: Run release changeset workflow
        id: changesets
        uses: changesets/action@v1
        with:
          version: corepack pnpm changeset version
          publish: corepack pnpm release:ci
          title: "Release: version packages"
          commit: "Release: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: release_meta
        run: |
          VERSION="$(node -p 'JSON.parse(require("node:fs").readFileSync("./apps/cli/package.json", "utf8")).version')"
          PACKAGE_NAME="$(node -p 'JSON.parse(require("node:fs").readFileSync("./apps/cli/package.json", "utf8")).name')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${PACKAGE_NAME}@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists for manual asset repair
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.release_meta.outputs.tag_name }}" >/dev/null 2>&1 \
            || gh release create "${{ steps.release_meta.outputs.tag_name }}" --verify-tag --generate-notes

      - name: Build and verify single-host bundle
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          corepack pnpm release:bundle
          node ./scripts/release/verify-single-host-bundle.mjs "dist/release/codex-swarm-single-host-${{ steps.release_meta.outputs.version }}.tar.gz"

      - name: Upload single-host bundle to GitHub Release
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release_meta.outputs.tag_name }}" "dist/release/codex-swarm-single-host-${{ steps.release_meta.outputs.version }}.tar.gz" --clobber
