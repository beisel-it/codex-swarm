name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high

  agent-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Run agent-doc validation
        run: pnpm ci:agent-docs

      - name: Record local reproduction
        if: always()
        run: echo '`corepack pnpm ci:agent-docs`' >> "$GITHUB_STEP_SUMMARY"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Run lint gate
        run: pnpm ci:lint

      - name: Record local reproduction
        if: always()
        run: echo '`corepack pnpm ci:lint`' >> "$GITHUB_STEP_SUMMARY"

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Run typecheck gate
        run: pnpm ci:typecheck

      - name: Record local reproduction
        if: always()
        run: echo '`corepack pnpm ci:typecheck`' >> "$GITHUB_STEP_SUMMARY"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Run test gate
        run: pnpm ci:test

      - name: Record local reproduction
        if: always()
        run: echo '`corepack pnpm ci:test`' >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Run build gate
        run: pnpm ci:build

      - name: Record local reproduction
        if: always()
        run: echo '`corepack pnpm ci:build`' >> "$GITHUB_STEP_SUMMARY"

  gate-summary:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dependency-review
      - agent-docs
      - lint
      - typecheck
      - test
      - build
    steps:
      - name: Summarize CI gate
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          AGENT_DOCS_RESULT: ${{ needs.agent-docs.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          {
            echo "## CI gate summary"
            echo
            echo "| Check | Result | Local reproduction |"
            echo "| --- | --- | --- |"
            echo "| dependency-review | ${DEPENDENCY_REVIEW_RESULT} | PR-only GitHub check |"
            echo "| agent-docs | ${AGENT_DOCS_RESULT} | \`corepack pnpm ci:agent-docs\` |"
            echo "| lint | ${LINT_RESULT} | \`corepack pnpm ci:lint\` |"
            echo "| typecheck | ${TYPECHECK_RESULT} | \`corepack pnpm ci:typecheck\` |"
            echo "| test | ${TEST_RESULT} | \`corepack pnpm ci:test\` |"
            echo "| build | ${BUILD_RESULT} | \`corepack pnpm ci:build\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any required gate failed
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          AGENT_DOCS_RESULT: ${{ needs.agent-docs.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          set -euo pipefail

          if [[ "${DEPENDENCY_REVIEW_RESULT}" != "success" && "${DEPENDENCY_REVIEW_RESULT}" != "skipped" ]]; then
            echo "dependency-review result: ${DEPENDENCY_REVIEW_RESULT}"
            exit 1
          fi

          for gate in AGENT_DOCS LINT TYPECHECK TEST BUILD; do
            result_var="${gate}_RESULT"
            result="${!result_var}"
            if [[ "${result}" != "success" ]]; then
              echo "${gate,,} result: ${result}"
              exit 1
            fi
          done
